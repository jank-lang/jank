[workspace]
authors = ["Fredrick Eisele", "Jeaye Wilkerson"]
channels = ["conda-forge"]
name = "jank"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"

[dependencies]
nushell = ">=0.100"
cmake = ">=3.21"
ninja = "*"
git = "*"
boost-cpp = "*"
libffi = "*"
zlib = "*"
zstd = "*"
llvmdev = "22.*"
clangdev = "22.*"
libclang-cpp = "22.*"

# entr is not available on Windows; the watch task is Linux/macOS only.
[target.linux-64.dependencies]
entr = "*"

[target.osx-64.dependencies]
entr = "*"

[target.osx-arm64.dependencies]
entr = "*"

# Windows: conda-forge clang with MSVC ABI + required build-time libraries.
[target.win-64.dependencies]
clang-cl_win-64 = ">=18"
openssl = "*"
zlib = "*"
boost-cpp = "*"

[tasks]

# Populate all git submodules (third-party dependencies).
[tasks.sync]
cmd = "nu bin/sync.nu"
description = "Initialise and update all git submodules"
inputs = [".gitmodules"]
outputs = ["compiler+runtime/stamps/sync.stamp"]

# Build the patched LLVM/Clang that jank requires.
[tasks.build-clang]
cmd = "nu compiler+runtime/bin/build-clang.nu"
description = "Build patched LLVM/Clang from source"
inputs = ["compiler+runtime/bin/build-clang.nu"]
outputs = [
  "compiler+runtime/build/llvm-install/usr/local/bin/clang++",
  "compiler+runtime/stamps/build-clang.stamp",
]

# ── debug profile ────────────────────────────────────────────────────────────

# Configure the debug CMake build.  Pass extra cmake -D flags after --:
#   pixi run configure -- -Djank_coverage=ON
[tasks.configure]
cmd = "nu bin/configure.nu --profile debug"
cwd = "compiler+runtime"
description = "Configure the jank CMake build (debug)"
depends-on = ["sync"]
inputs = [
  "compiler+runtime/CMakeLists.txt",
  "compiler+runtime/cmake/**/*",
  "compiler+runtime/bin/jank-mod.nu",
  "compiler+runtime/bin/configure.nu",
  "compiler+runtime/bin/ar-merge.nu",
  "compiler+runtime/stamps/sync.stamp",
]
outputs = [
  "compiler+runtime/build/debug/build.ninja",
  "compiler+runtime/stamps/debug/configure.stamp",
]

# Compile jank (debug).  Pass extra cmake --build flags after --:
#   pixi run build -- --target jank_exe_phase_1
[tasks.build]
cmd = "nu bin/compile.nu --profile debug"
cwd = "compiler+runtime"
description = "Compile jank (debug)"
depends-on = ["configure"]
inputs = [
  "compiler+runtime/src/**/*",
  "compiler+runtime/include/**/*",
  "compiler+runtime/third-party/**/*",
  "compiler+runtime/bin/compile.nu",
  "compiler+runtime/stamps/debug/configure.stamp",
]
outputs = [
  "compiler+runtime/build/debug/jank",
  "compiler+runtime/stamps/debug/build.stamp",
]

# ── release profile ──────────────────────────────────────────────────────────

# Configure the release CMake build.
[tasks.configure-release]
cmd = "nu bin/configure.nu --profile release"
cwd = "compiler+runtime"
description = "Configure the jank CMake build (release)"
depends-on = ["sync"]
inputs = [
  "compiler+runtime/CMakeLists.txt",
  "compiler+runtime/cmake/**/*",
  "compiler+runtime/bin/jank-mod.nu",
  "compiler+runtime/bin/configure.nu",
  "compiler+runtime/bin/ar-merge.nu",
  "compiler+runtime/stamps/sync.stamp",
]
outputs = [
  "compiler+runtime/build/release/build.ninja",
  "compiler+runtime/stamps/release/configure.stamp",
]

# Compile jank (release).
[tasks.build-release]
cmd = "nu bin/compile.nu --profile release"
cwd = "compiler+runtime"
description = "Compile jank (release)"
depends-on = ["configure-release"]
inputs = [
  "compiler+runtime/src/**/*",
  "compiler+runtime/include/**/*",
  "compiler+runtime/third-party/**/*",
  "compiler+runtime/bin/compile.nu",
  "compiler+runtime/stamps/release/configure.stamp",
]
outputs = [
  "compiler+runtime/build/release/jank",
  "compiler+runtime/stamps/release/build.stamp",
]

# ── shared tasks ─────────────────────────────────────────────────────────────

# Remove build artifacts and CMake state for both profiles.
[tasks.clean]
cmd = "nu bin/clean.nu"
cwd = "compiler+runtime"
description = "Clean build artifacts (both profiles)"

# Run the test suite against the debug build (compiles with tests enabled).
[tasks.test]
cmd = "nu bin/test.nu"
cwd = "compiler+runtime"
description = "Build and run the jank test suite"
depends-on = ["build"]
inputs = [
  "compiler+runtime/src/**/*",
  "compiler+runtime/include/**/*",
  "compiler+runtime/test/**/*",
  "compiler+runtime/bin/test.nu",
  "compiler+runtime/stamps/debug/build.stamp",
]
outputs = ["compiler+runtime/stamps/debug/test.stamp"]

# Install jank from the release build.  Pass cmake --install flags after --.
[tasks.install]
cmd = "nu bin/install.nu --profile release"
cwd = "compiler+runtime"
description = "Install jank (release)"
depends-on = ["build-release"]
inputs = [
  "compiler+runtime/build/release/jank",
  "compiler+runtime/bin/install.nu",
  "compiler+runtime/stamps/release/build.stamp",
]
outputs = ["compiler+runtime/stamps/release/install.stamp"]

# Format modified C++ source files via clang-format.
[tasks.format]
cmd = "nu bin/format.nu"
cwd = "compiler+runtime"
description = "Format modified C++ source files"
inputs = [
  "compiler+runtime/src/**/*.cpp",
  "compiler+runtime/src/**/*.hpp",
  "compiler+runtime/include/**/*.hpp",
  "compiler+runtime/include/**/*.cpp",
]
outputs = ["compiler+runtime/stamps/format.stamp"]

# Syntax-check all nushell scripts under compiler+runtime/bin/.
[tasks.lint]
cmd = "nu bin/ci/lint.nu"
cwd = "compiler+runtime"
description = "Syntax-check nushell scripts"
inputs = [
  "compiler+runtime/bin/**/*.nu",
  "bin/**/*.nu",
  "book/bin/**/*.nu",
]
outputs = ["compiler+runtime/stamps/lint.stamp"]

# Start the jank REPL using the debug build.
[tasks.repl]
cmd = "compiler+runtime/build/debug/jank repl"
description = "Start the jank REPL (debug)"
depends-on = ["build"]
inputs = ["compiler+runtime/stamps/debug/build.stamp"]

# Verify that git GPG commit signing is configured correctly.
[tasks.verify-gpg]
cmd = "nu bin/verify-git-gpg.nu"
description = "Verify git GPG signing is working"

# Watch tracked files and re-run a command on change (Linux/macOS only — requires entr).
#   pixi run watch -- nu bin/compile.nu
[target.linux-64.tasks.watch]
cmd = "nu bin/watch.nu"
cwd = "compiler+runtime"
description = "Watch files and re-run a command on change"

[target.osx-64.tasks.watch]
cmd = "nu bin/watch.nu"
cwd = "compiler+runtime"
description = "Watch files and re-run a command on change"

[target.osx-arm64.tasks.watch]
cmd = "nu bin/watch.nu"
cwd = "compiler+runtime"
description = "Watch files and re-run a command on change"
