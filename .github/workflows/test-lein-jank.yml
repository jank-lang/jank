name: Test lein-jank

on:
  pull_request:
    paths:
      - 'lein-jank/**'
  push:
    branches:
      - main
    paths:
      - 'lein-jank/**'
  workflow_dispatch:

permissions:
  contents: read

# Only allow one build per branch at a time. New builds will cancel existing builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install apt packages
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@5902b33ae29014e6ca012c5d8025d4346556bd40
        with:
          packages: clojure leiningen
          # Increment this when the package list changes.
          version: 1
      - name: Install babashka
        run: |
          curl -sL -o install-bb https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install-bb
          sudo ./install-bb
      - name: lein test
        id: lein-test
        run: |
          cd lein-jank
          lein test
